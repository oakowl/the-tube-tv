<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Oswald:wght@400;600&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(ellipse at center,#1a1408 0%,#080602 100%);font-family:'Special Elite',cursive;color:#d4b483;padding:10px 8px 28px;min-height:100vh}
.site-header{text-align:center;padding:10px 0 8px}
.logo{font-family:'VT323',monospace;font-size:clamp(2rem,7vw,4.2rem);color:#f5a623;letter-spacing:.15em;line-height:1}
.logo span{color:#fff}
.tagline{font-family:'VT323',monospace;font-size:.85rem;color:#6a5030;letter-spacing:.3em;margin-top:3px}
.divider{width:50%;height:1px;background:linear-gradient(90deg,transparent,#c47d0e,transparent);margin:7px auto 0}

/* header actions */
.header-actions{display:flex;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.hbtn{font-family:'VT323',monospace;font-size:.82rem;padding:5px 14px;border-radius:3px;cursor:pointer;letter-spacing:.1em;transition:all .15s;border:none;display:flex;align-items:center;gap:5px}
.hbtn:active{transform:scale(.96)}
.btn-share{background:#1a1200;color:#f5a623;border:1px solid #3a2800}
.btn-share:hover{background:#2a1e00;box-shadow:0 0 8px rgba(245,166,35,.2)}
.btn-donate{background:#0d1a0d;color:#39ff14;border:1px solid #1a3a1a}
.btn-donate:hover{background:#122012;box-shadow:0 0 8px rgba(57,255,20,.2)}
.btn-surprise{background:#1a001a;color:#ff80ff;border:1px solid #3a1a3a}
.btn-surprise:hover{background:#250025;box-shadow:0 0 8px rgba(255,100,255,.2)}

.layout{display:grid;grid-template-columns:1fr 310px;gap:18px;max-width:1100px;margin:0 auto;padding:10px 6px 0;align-items:start}
@media(max-width:740px){.layout{grid-template-columns:1fr}}

/* ── 90s CRT TV ── */
/* Outer shell — light grey plastic boxy 90s style */
.tv-shell{
  background:linear-gradient(160deg,#c8c8c0 0%,#b0b0a8 30%,#989890 60%,#888880 100%);
  border-radius:12px 12px 16px 16px;
  padding:16px 16px 14px;
  box-shadow:
    4px 4px 0 #707068,
    8px 8px 0 #606058,
    0 20px 60px rgba(0,0,0,.85),
    inset 0 1px 0 rgba(255,255,255,.5),
    inset -2px -2px 0 rgba(0,0,0,.2);
  position:relative;
}
/* Raised ridge around front panel */
.tv-shell::before{
  content:'';position:absolute;inset:8px;
  border-radius:8px;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.3),inset 0 -1px 2px rgba(255,255,255,.2);
  pointer-events:none;
}

.tv-top-strip{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 2px}
.tv-brand-90s{font-family:'VT323',monospace;font-size:.9rem;color:#3a3a32;letter-spacing:.3em;text-transform:uppercase;text-shadow:0 1px 0 rgba(255,255,255,.4)}
.ch-display{font-family:'VT323',monospace;font-size:1.2rem;color:#ff4400;background:#0a0200;padding:2px 8px;border-radius:3px;border:2px solid #333;min-width:54px;text-align:center;box-shadow:inset 0 2px 4px rgba(0,0,0,.8)}

/* Screen area */
.screen-housing{
  background:#2a2a28;
  border-radius:8px;
  padding:10px 10px 14px;
  box-shadow:inset 0 4px 8px rgba(0,0,0,.8),inset 0 -2px 4px rgba(255,255,255,.05);
  margin-bottom:12px;
}
.screen-bezel-90s{
  background:#1a1a18;
  border-radius:5px;
  padding:6px;
  box-shadow:inset 0 0 20px rgba(0,0,0,.9),0 0 0 1px #111;
}
.screen-wrap{position:relative;border-radius:4px;overflow:hidden;aspect-ratio:4/3;background:#050500}

/* CRT effects */
.scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.22) 2px,rgba(0,0,0,0.22) 4px);z-index:15;pointer-events:none}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 48%,rgba(0,0,0,.65) 100%);z-index:16;pointer-events:none}
.phosphor-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(100,200,50,.03) 0%,transparent 70%);z-index:14;pointer-events:none}

/* Controls row below screen — 90s style front panel */
.controls-panel{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:linear-gradient(180deg,#a8a8a0,#989890);
  margin:-4px -4px -4px;
  padding:8px 12px 6px;
  border-radius:0 0 6px 6px;
  box-shadow:inset 0 2px 3px rgba(0,0,0,.2);
}

/* Big functional knobs — 90s style */
.knob-group{display:flex;gap:10px;align-items:center}
.knob-unit{display:flex;flex-direction:column;align-items:center;gap:2px}
.knob90{
  width:32px;height:32px;border-radius:50%;
  cursor:pointer;position:relative;
  transition:transform .12s;
  box-shadow:2px 2px 4px rgba(0,0,0,.5),-1px -1px 2px rgba(255,255,255,.3),inset 0 2px 3px rgba(255,255,255,.2),inset 0 -2px 3px rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
}
.knob90.k-vol{background:radial-gradient(circle at 38% 35%,#888,#444)}
.knob90.k-static{background:radial-gradient(circle at 38% 35%,#666,#333)}
.knob90.k-bright{background:radial-gradient(circle at 38% 35%,#777,#3a3a3a)}
.knob90:active{box-shadow:1px 1px 2px rgba(0,0,0,.5),inset 0 2px 4px rgba(0,0,0,.5)}
/* Notch line on knob */
.knob90::after{content:'';position:absolute;width:3px;height:10px;background:rgba(255,255,255,.7);border-radius:2px;top:4px;left:50%;transform:translateX(-50%);transform-origin:50% 12px}
.knob90.rotating::after{animation:none}
.kl90{font-family:'VT323',monospace;font-size:.58rem;color:#4a4a40;letter-spacing:.08em;text-align:center}

/* Static intensity bar */
.static-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.static-bar{width:60px;height:5px;background:#555;border-radius:3px;overflow:hidden;border:1px solid #333}
.static-bar-fill{height:100%;background:linear-gradient(90deg,#39ff14,#f5a623);border-radius:3px;transition:width .1s}

/* Power button — big chunky 90s style */
.pwr-area{display:flex;flex-direction:column;align-items:center;gap:4px}
.pwr90{
  width:28px;height:28px;border-radius:4px;
  background:linear-gradient(160deg,#cc3300,#881100);
  border:2px solid #551100;
  cursor:pointer;transition:all .15s;
  box-shadow:2px 2px 4px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,100,50,.3);
  display:flex;align-items:center;justify-content:center;
}
.pwr90::after{content:'⏻';font-size:.9rem;color:rgba(255,255,255,.6)}
.pwr90.on{background:linear-gradient(160deg,#ff4400,#cc2200);box-shadow:2px 2px 4px rgba(0,0,0,.4),0 0 12px rgba(255,60,0,.6),inset 0 1px 0 rgba(255,150,100,.4)}
.pwr90.on::after{color:#fff}
.pwr-lbl{font-family:'VT323',monospace;font-size:.52rem;color:#4a4a40;letter-spacing:.08em}

/* Speaker grille — 90s style horizontal slots */
.spkr90{display:flex;flex-direction:column;gap:3px;width:40px}
.spkr-slot{height:3px;background:#555;border-radius:1px;box-shadow:0 1px 0 rgba(255,255,255,.1)}

/* TV Stand/base */
.tv-base{
  width:70%;margin:0 auto;
  height:12px;
  background:linear-gradient(160deg,#b0b0a8,#888880);
  border-radius:0 0 8px 8px;
  box-shadow:0 4px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2);
}
.src-note{font-family:'VT323',monospace;font-size:.58rem;color:#2a1a08;text-align:center;margin-top:5px;letter-spacing:.08em}

/* Screen layers */
.idle{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:#060600;position:absolute;inset:0;z-index:2}
.idle-icon{font-size:2.6rem}
.idle-title{font-family:'VT323',monospace;font-size:1.9rem;color:#f5a623;margin-top:3px}
.idle-sub{font-family:'VT323',monospace;font-size:.72rem;color:#4a3a20;letter-spacing:.2em;margin-top:3px}
.test-bars{display:flex;width:100%;height:16px;margin-top:14px}
.test-bar{flex:1}
.static-screen{position:absolute;inset:0;z-index:10;display:none;align-items:center;justify-content:center;background:#111}
.static-screen.show{display:flex}
.static-txt{font-family:'VT323',monospace;font-size:1rem;color:rgba(255,255,255,.8);z-index:2;letter-spacing:.2em;animation:flk .12s infinite}
canvas.noise{position:absolute;inset:0;width:100%;height:100%}
.off-screen{position:absolute;inset:0;background:#000;z-index:12;display:none;align-items:center;justify-content:center}
.off-screen.show{display:flex}
.off-line{width:100%;height:2px;background:#fff;animation:offAnim .5s ease-out forwards}
@keyframes offAnim{0%{opacity:1;transform:scaleX(1) scaleY(8)}60%{opacity:1;transform:scaleX(.5) scaleY(1)}100%{opacity:0;transform:scaleX(0) scaleY(0)}}
.video-layer{position:absolute;inset:0;z-index:3;display:none}
.video-layer.show{display:block}
.video-layer iframe{width:100%;height:100%;border:none;display:block}
.splash{position:absolute;inset:0;z-index:4;display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,0,0,.74);padding:10px}
.splash.show{display:flex}
.splash-emoji{font-size:3.2rem}
.splash-title{font-family:'VT323',monospace;font-size:1.1rem;color:#f5a623;margin-top:6px;text-align:center;letter-spacing:.04em;line-height:1.2}
.splash-year{font-family:'VT323',monospace;font-size:.72rem;color:#7a5a28;letter-spacing:.1em;margin-top:2px}
.splash-ep{font-family:'Special Elite',cursive;font-size:.56rem;color:#aaa;margin-top:3px;text-align:center;line-height:1.4}
.splash-play{margin-top:10px;width:42px;height:42px;border-radius:50%;background:rgba(245,166,35,.12);border:2px solid #f5a623;display:flex;align-items:center;justify-content:center}
.splash-play::after{content:'';width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-left:16px solid #f5a623;margin-left:4px}
.splash-hint{font-family:'VT323',monospace;font-size:.58rem;color:#4a3015;margin-top:5px;letter-spacing:.1em}
.ticker-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(5,5,0,.93);border-top:1px solid #1e1600;padding:3px 8px;z-index:5;overflow:hidden;white-space:nowrap;display:none}
.ticker-bar.show{display:block}
.ticker-inner{display:inline-block;font-family:'VT323',monospace;font-size:.75rem;color:#f5a623;animation:ticker 30s linear infinite}
.ep-pill{position:absolute;top:5px;right:5px;font-family:'VT323',monospace;font-size:.6rem;background:rgba(10,10,0,.85);color:#4a8cff;padding:2px 6px;border:1px solid #2a3860;z-index:6;display:none;letter-spacing:.07em}
.ep-pill.show{display:block}

/* ── GUIDE ── */
.guide-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;border-bottom:1px solid #1e1600;padding-bottom:7px}
.guide-title{font-family:'VT323',monospace;font-size:1.6rem;color:#f5a623;letter-spacing:.08em}
.guide-date{font-family:'VT323',monospace;font-size:.75rem;color:#4a3015;letter-spacing:.12em}
.cat-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px}
.cat-btn{font-family:'VT323',monospace;font-size:.68rem;padding:2px 7px;border:1px solid #2a1e0a;background:transparent;color:#7a5a2a;cursor:pointer;letter-spacing:.06em;border-radius:2px;transition:all .13s;white-space:nowrap}
.cat-btn:hover,.cat-btn.active{background:#120c00;color:#f5a623;border-color:#c47d0e}
.cat-btn:active{transform:scale(.95)}

/* THICKER scrollbar */
.show-list{display:flex;flex-direction:column;gap:4px;max-height:60vh;overflow-y:auto;padding-right:4px}
.show-list::-webkit-scrollbar{width:10px}
.show-list::-webkit-scrollbar-track{background:#0a0800;border-radius:4px;border:1px solid #1a1200}
.show-list::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#5a3a10,#3a2008);border-radius:4px;border:1px solid #7a5020}
.show-list::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#8a5a20,#5a3a10)}

.show-card{display:flex;gap:6px;align-items:center;background:#0c0900;border:1px solid #1a1400;border-left:3px solid #1e1600;padding:5px 7px;cursor:pointer;transition:all .13s;user-select:none}
.show-card:hover{border-left-color:#f5a623;background:#110d00}
.show-card:active{transform:scale(.98)}
.show-card.active{border-left-color:#39ff14;background:#060d00}
.s-time{font-family:'VT323',monospace;font-size:.78rem;color:#4a3015;min-width:40px;flex-shrink:0}
.show-card.active .s-time{color:#39ff14}
.s-emoji{font-size:1.2rem;width:26px;text-align:center;flex-shrink:0}
.s-info{flex:1;min-width:0}
.s-name{font-family:'Oswald',sans-serif;font-size:.76rem;font-weight:600;color:#d4b483;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.show-card.active .s-name{color:#39ff14}
.s-yr{font-size:.55rem;color:#3a2a10;font-family:'VT323',monospace}
.s-desc{font-family:'Special Elite',cursive;font-size:.58rem;color:#4a3015;margin-top:1px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.s-badges{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap}
.badge{font-family:'VT323',monospace;font-size:.54rem;padding:1px 3px;border:1px solid #1e1600;color:#6a4a20;letter-spacing:.05em}
.badge.live{border-color:#39ff14;color:#39ff14;animation:flk 2s infinite}
.badge.playlist{border-color:#4a8cff;color:#6aacff}
.badge.hot{border-color:#ff6a00;color:#ff8c2a}
.play-dot{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:7px solid #39ff14;flex-shrink:0;opacity:0;transition:opacity .2s}
.show-card:hover .play-dot{opacity:.35}
.show-card.active .play-dot{opacity:1}
.np-bar{display:none;gap:7px;align-items:center;margin-top:8px;padding:6px 9px;background:#060800;border:1px solid #1a1400}
.np-bar.show{display:flex}
.np-live{font-family:'VT323',monospace;font-size:.65rem;color:#39ff14;letter-spacing:.15em;flex-shrink:0;animation:flk 2s infinite}
.np-name{font-family:'Oswald',sans-serif;font-size:.7rem;color:#d4b483;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-ch{font-family:'VT323',monospace;font-size:.7rem;color:#f5a623;flex-shrink:0}

/* Toast notification */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1200;border:1px solid #f5a623;color:#f5a623;font-family:'VT323',monospace;font-size:.9rem;padding:8px 20px;border-radius:3px;z-index:999;opacity:0;transition:all .3s;letter-spacing:.1em;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes flk{0%,90%,100%{opacity:1}95%{opacity:.25}}
@keyframes ticker{0%{transform:translateX(60%)}100%{transform:translateX(-100%)}}
@keyframes surprisePulse{0%{box-shadow:0 0 8px rgba(255,100,255,.3)}50%{box-shadow:0 0 20px rgba(255,100,255,.7)}100%{box-shadow:0 0 8px rgba(255,100,255,.3)}}
</style>
</head>
<body>

<div class="site-header">
  <div class="logo">THE <span>TUBE</span></div>
  <div class="tagline">◈ Classic Television Archive ◈</div>
  <div class="divider"></div>
  <div class="header-actions">
    <button class="hbtn btn-share" id="shareBtn">📤 SHARE</button>
    <button class="hbtn btn-donate" id="donateBtn">💚 DONATE</button>
    <button class="hbtn btn-surprise" id="surpriseBtn">🎲 SURPRISE ME</button>
  </div>
</div>

<div class="layout">
  <!-- 90s TV SET -->
  <div>
    <div class="tv-shell">
      <div class="tv-top-strip">
        <span class="tv-brand-90s">NOSTALGIVISION™</span>
        <div class="ch-display" id="chDisp">— —</div>
      </div>

      <div class="screen-housing">
        <div class="screen-bezel-90s">
          <div class="screen-wrap" id="screenWrap">
            <div class="phosphor-glow"></div>
            <div class="scanlines"></div>
            <div class="vignette"></div>

            <div class="idle" id="idle">
              <div class="idle-icon">📺</div>
              <div class="idle-title">THE TUBE</div>
              <div class="idle-sub">◈ SELECT A PROGRAMME ◈</div>
              <div class="test-bars">
                <div class="test-bar" style="background:#fff"></div>
                <div class="test-bar" style="background:#ff0"></div>
                <div class="test-bar" style="background:#0ff"></div>
                <div class="test-bar" style="background:#0f0"></div>
                <div class="test-bar" style="background:#f0f"></div>
                <div class="test-bar" style="background:#f00"></div>
                <div class="test-bar" style="background:#00f"></div>
                <div class="test-bar" style="background:#000"></div>
              </div>
            </div>

            <div class="off-screen" id="offScreen"><div class="off-line"></div></div>
            <div class="static-screen" id="staticScreen">
              <canvas class="noise" id="noiseCanvas"></canvas>
              <div class="static-txt">TUNING...</div>
            </div>
            <div class="video-layer" id="videoLayer">
              <iframe id="videoFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
            </div>
            <div class="splash" id="splash">
              <div class="splash-emoji" id="splashEmoji"></div>
              <div class="splash-title" id="splashTitle"></div>
              <div class="splash-year" id="splashYear"></div>
              <div class="splash-ep" id="splashEp"></div>
              <div class="splash-play"></div>
              <div class="splash-hint">▶ CLICK TO WATCH</div>
            </div>
            <div class="ticker-bar" id="tickerBar"><span class="ticker-inner" id="tickerTxt"></span></div>
            <div class="ep-pill" id="epPill">▶ PLAYLIST</div>
          </div>
        </div>
      </div>

      <!-- 90s style controls panel -->
      <div class="controls-panel">
        <div class="knob-group">
          <!-- VOL knob -->
          <div class="knob-unit">
            <div class="knob90 k-vol" id="kVol" title="Volume"></div>
            <span class="kl90">VOL</span>
          </div>
          <!-- STATIC knob — actually adjusts static intensity -->
          <div class="knob-unit">
            <div class="knob90 k-static" id="kStatic" title="Static Intensity"></div>
            <span class="kl90">STATIC</span>
            <div class="static-bar-wrap">
              <div class="static-bar"><div class="static-bar-fill" id="staticBarFill" style="width:40%"></div></div>
            </div>
          </div>
          <!-- BRIGHT knob -->
          <div class="knob-unit">
            <div class="knob90 k-bright" id="kBright" title="Brightness"></div>
            <span class="kl90">BRIGHT</span>
          </div>
        </div>

        <div class="pwr-area">
          <div class="pwr90" id="pwrBtn" title="Power"></div>
          <span class="pwr-lbl">POWER</span>
        </div>

        <div class="spkr90">
          <div class="spkr-slot"></div><div class="spkr-slot"></div><div class="spkr-slot"></div>
          <div class="spkr-slot"></div><div class="spkr-slot"></div><div class="spkr-slot"></div>
          <div class="spkr-slot"></div><div class="spkr-slot"></div>
        </div>
      </div>
    </div>

    <div class="tv-base"></div>
    <div class="src-note">◈ STREAMING VIA INTERNET ARCHIVE ◈</div>
  </div>

  <!-- GUIDE -->
  <div>
    <div class="guide-hdr">
      <span class="guide-title">📋 PROGRAMME GUIDE</span>
      <span class="guide-date" id="gDate"></span>
    </div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="show-list" id="showList"></div>
    <div class="np-bar" id="npBar">
      <span class="np-live">▶ ON AIR</span>
      <span class="np-name" id="npName">—</span>
      <span class="np-ch" id="npCh">CH —</span>
    </div>
  </div>
</div>

let active=null,tvOn=false,activeCat='all',noiseTimer=null;
let kRotations={kVol:0,kStatic:0,kBright:0};
let staticIntensity=0.4; // 0–1
let brightnessMod=1.0;
let audioCtx=null;

/* ── AUDIO ── */
const ga=()=>{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;};

// Smooth satisfying click — layered thump + high transient
function sndClick(){
  try{
    const c=ga();
    // Low thump
    const o1=c.createOscillator(),g1=c.createGain();
    o1.connect(g1);g1.connect(c.destination);
    o1.type='sine';o1.frequency.setValueAtTime(180,c.currentTime);
    o1.frequency.exponentialRampToValueAtTime(60,c.currentTime+0.08);
    g1.gain.setValueAtTime(0.22,c.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);
    o1.start();o1.stop(c.currentTime+0.1);
    // High snap
    const bufLen=c.sampleRate*0.015;
    const buf=c.createBuffer(1,bufLen,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(bufLen*0.3));
    const src=c.createBufferSource();src.buffer=buf;
    const f=c.createBiquadFilter();f.type='highpass';f.frequency.value=2000;
    const g2=c.createGain();g2.gain.value=0.12;
    src.connect(f);f.connect(g2);g2.connect(c.destination);
    src.start();src.stop(c.currentTime+0.02);
  }catch(e){}
}

// Smooth knob — soft mechanical detent
function sndKnob(){
  try{
    const c=ga();
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sine';o.frequency.setValueAtTime(240,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.04);
    g.gain.setValueAtTime(0.1,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);
    o.start();o.stop(c.currentTime+0.06);
    // Soft tick layer
    const b2=c.createBuffer(1,c.sampleRate*0.01,c.sampleRate);
    const d2=b2.getChannelData(0);
    for(let i=0;i<d2.length;i++)d2[i]=(Math.random()*2-1)*0.4;
    const s2=c.createBufferSource();s2.buffer=b2;
    const g3=c.createGain();g3.gain.value=0.06;
    s2.connect(g3);g3.connect(c.destination);
    s2.start();
  }catch(e){}
}

function sndPowerOn(){
  try{
    const c=ga(),bl=c.sampleRate*1.4,b=c.createBuffer(1,bl,c.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<bl;i++)d[i]=Math.random()*2-1;
    const s=c.createBufferSource();s.buffer=b;
    const f=c.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(2000,c.currentTime);f.frequency.exponentialRampToValueAtTime(200,c.currentTime+1.2);f.Q.value=0.8;
    const g=c.createGain();g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.35,c.currentTime+0.08);g.gain.setValueAtTime(0.35,c.currentTime+0.8);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+1.4);
    s.connect(f);f.connect(g);g.connect(c.destination);s.start();s.stop(c.currentTime+1.4);
  }catch(e){}
}

function sndPowerOff(){
  try{
    const c=ga(),bl=c.sampleRate*0.5,b=c.createBuffer(1,bl,c.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<bl;i++)d[i]=Math.random()*2-1;
    const s=c.createBufferSource();s.buffer=b;
    const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=400;f.Q.value=1.5;
    const g2=c.createGain();g2.gain.setValueAtTime(0.3,c.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);
    const o=c.createOscillator(),og=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(800,c.currentTime);o.frequency.exponentialRampToValueAtTime(40,c.currentTime+0.4);
    og.gain.setValueAtTime(0.2,c.currentTime);og.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);
    o.connect(og);og.connect(c.destination);
    s.connect(f);f.connect(g2);g2.connect(c.destination);
    s.start();s.stop(c.currentTime+0.5);o.start();o.stop(c.currentTime+0.5);
  }catch(e){}
}

function sndTune(){
  try{
    const c=ga(),bl=c.sampleRate*0.9,b=c.createBuffer(1,bl,c.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<bl;i++)d[i]=Math.random()*2-1;
    const s=c.createBufferSource();s.buffer=b;
    const f=c.createBiquadFilter();f.type='bandpass';
    f.frequency.setValueAtTime(4000,c.currentTime);f.frequency.exponentialRampToValueAtTime(400,c.currentTime+0.7);f.Q.value=1.2;
    const g=c.createGain();g.gain.setValueAtTime(0.28*staticIntensity*2.5,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.9);
    s.connect(f);f.connect(g);g.connect(c.destination);s.start();s.stop(c.currentTime+0.9);
  }catch(e){}
}

/* ── KNOB CONTROL ── */
function rotateKnob(id,delta){
  kRotations[id]=(kRotations[id]||0)+delta;
  const el=document.getElementById(id);
  if(!el)return;
  el.style.transform=`rotate(${kRotations[id]}deg)`;
}

// Static knob — controls visual + audio static intensity
function setupStaticKnob(){
  const el=document.getElementById('kStatic');
  let clicks=0;
  el.addEventListener('click',()=>{
    sndKnob();
    clicks=(clicks+1)%8; // 8 positions 0–7
    staticIntensity=clicks/7;
    rotateKnob('kStatic',45);
    // Update bar
    document.getElementById('staticBarFill').style.width=`${Math.round(staticIntensity*100)}%`;
    // Apply to scanlines opacity
    const sl=document.querySelector('.scanlines');
    if(sl) sl.style.opacity=0.4+staticIntensity*0.6;
    // Apply phosphor effect
    const pg=document.querySelector('.phosphor-glow');
    if(pg) pg.style.opacity=staticIntensity;
  });
}

// Brightness knob
function setupBrightKnob(){
  const el=document.getElementById('kBright');
  let clicks=0;
  el.addEventListener('click',()=>{
    sndKnob();
    clicks=(clicks+1)%8;
    brightnessMod=0.5+clicks*(1.0/7);
    rotateKnob('kBright',45);
    // Apply brightness filter to screen
    const sw=document.getElementById('screenWrap');
    if(sw) sw.style.filter=`brightness(${brightnessMod})`;
  });
}

document.getElementById('kVol').addEventListener('click',()=>{sndKnob();rotateKnob('kVol',45);});

/* ── CANVAS NOISE ── */
function drawNoise(){
  const c=document.getElementById('noiseCanvas');
  const w=c.width=c.offsetWidth||300,h=c.height=c.offsetHeight||225;
  const ctx=c.getContext('2d'),img=ctx.createImageData(w,h);
  const intensity=0.3+staticIntensity*0.7;
  for(let i=0;i<img.data.length;i+=4){
    const v=Math.random()*255*intensity;
    img.data[i]=v;img.data[i+1]=v;img.data[i+2]=v;img.data[i+3]=255;
  }
  ctx.putImageData(img,0,0);
}

function showStatic(cb){
  const ss=document.getElementById('staticScreen');
  ss.classList.add('show');sndTune();
  let f=0;
  const frames=Math.max(8,Math.round(8+staticIntensity*20));
  noiseTimer=setInterval(()=>{
    drawNoise();
    if(++f>=frames){clearInterval(noiseTimer);ss.classList.remove('show');if(cb)cb();}
  },50);
}

/* ── SHOW TUNING ── */
function tuneShow(id){
  if(!tvOn){powerToggle(()=>setTimeout(()=>tuneShow(id),400));return;}
  const s=shows.find(x=>x.id===id);if(!s)return;
  document.getElementById('videoLayer').classList.remove('show');
  document.getElementById('videoFrame').src='';
  document.getElementById('splash').classList.remove('show');
  document.getElementById('tickerBar').classList.remove('show');
  document.getElementById('epPill').classList.remove('show');
  document.getElementById('chDisp').textContent=`CH ${s.ch}`;

  showStatic(()=>{
    active=s;
    document.getElementById('idle').style.display='none';
    document.getElementById('splashEmoji').textContent=s.emoji;
    document.getElementById('splashTitle').textContent=s.name;
    document.getElementById('splashYear').textContent=s.year;
    document.getElementById('splashEp').textContent=s.episodeName;
    const splash=document.getElementById('splash');
    splash.classList.add('show');

    const t=s.tickers.join('   ◈   ');
    const tk=document.getElementById('tickerTxt');
    tk.textContent=`◈  ${t}  ◈  ${t}  ◈`;
    tk.style.animation='none';void tk.offsetHeight;tk.style.animation='';
    document.getElementById('tickerBar').classList.add('show');
    if(s.playlist) document.getElementById('epPill').classList.add('show');

    document.getElementById('npName').textContent=s.name;
    document.getElementById('npCh').textContent=`CH ${s.ch}`;
    document.getElementById('npBar').classList.add('show');

    const embedUrl=`https://archive.org/embed/${s.archiveId}?autoplay=1&playlist=1`;
    splash.onclick=()=>{
      splash.classList.remove('show');
      document.getElementById('videoFrame').src=embedUrl;
      document.getElementById('videoLayer').classList.add('show');
    };
    renderList();
  });
}

/* ── POWER ── */
function powerToggle(cb){
  const btn=document.getElementById('pwrBtn');
  if(!tvOn){
    tvOn=true;btn.classList.add('on');sndPowerOn();
    document.getElementById('idle').style.display='flex';
    if(cb)cb();
  }else{
    sndPowerOff();btn.classList.remove('on');tvOn=false;active=null;
    clearInterval(noiseTimer);
    ['staticScreen','videoLayer','splash','tickerBar','epPill','npBar'].forEach(id=>{
      const el=document.getElementById(id);if(el)el.classList.remove('show');
    });
    document.getElementById('videoFrame').src='';
    document.getElementById('chDisp').textContent='— —';
    const off=document.getElementById('offScreen');
    off.innerHTML='<div class="off-line"></div>';off.classList.add('show');
    setTimeout(()=>{off.classList.remove('show');document.getElementById('idle').style.display='flex';},600);
    renderList();
  }
}

/* ── TOAST ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── SHARE ── */
document.getElementById('shareBtn').addEventListener('click',()=>{
  sndClick();
  const url=window.location.href;
  if(navigator.share){
    navigator.share({title:'The Tube — Retro TV Archive',text:'Watch classic TV on a vintage CRT!',url}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>showToast('◈ LINK COPIED TO CLIPBOARD ◈'));
  } else {
    showToast('◈ '+url+' ◈');
  }
});

/* ── DONATE ── */
document.getElementById('donateBtn').addEventListener('click',()=>{
  sndClick();
  window.open('https://www.paypal.com/donate/?hosted_button_id=&business=oakowlrecords%40gmail.com&currency_code=GBP&item_name=The+Tube+%E2%80%94+Retro+TV+Archive','_blank');
  showToast('◈ THANK YOU FOR YOUR SUPPORT ◈');
});

/* ── SURPRISE ME ── */
document.getElementById('surpriseBtn').addEventListener('click',()=>{
  sndClick();
  const pick=shows[Math.floor(Math.random()*shows.length)];
  showToast(`◈ TUNING TO: ${pick.name} ◈`);
  setTimeout(()=>tuneShow(pick.id),600);
});

/* ── CATEGORY TABS ── */
function buildCatTabs(){
  const el=document.getElementById('catTabs');
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c.key==='all'?' active':'');
    b.textContent=c.label;b.dataset.cat=c.key;
    b.addEventListener('click',()=>{
      sndClick();
      document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');activeCat=c.key;renderList();
    });
    el.appendChild(b);
  });
}

function renderList(){
  const el=document.getElementById('showList');el.innerHTML='';
  const filtered=activeCat==='all'?shows:shows.filter(s=>s.cat===activeCat);
  filtered.forEach(s=>{
    const card=document.createElement('div');
    card.className='show-card'+(active?.id===s.id?' active':'');
    const bhtml=s.badges.map(b=>{
      let cls='badge';
      if(b==='PLAYLIST')cls+=' playlist';
      else if(b==='HOT')cls+=' hot';
      else if(['LIVE','ON AIR'].includes(b))cls+=' live';
      return`<span class="${cls}">${b}</span>`;
    }).join('');
    card.innerHTML=`<span class="s-time">${s.time}</span><span class="s-emoji">${s.emoji}</span><div class="s-info"><div class="s-name">${s.name} <span class="s-yr">(${s.year})</span></div><div class="s-desc">${s.desc}</div><div class="s-badges">${bhtml}</div></div><div class="play-dot"></div>`;
    card.addEventListener('click',()=>{sndClick();tuneShow(s.id);});
    el.appendChild(card);
  });
}

document.getElementById('pwrBtn').addEventListener('click',()=>powerToggle());

const days=['SUN','MON','TUE','WED','THU','FRI','SAT'],months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const d=new Date();
document.getElementById('gDate').textContent=`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;

setupStaticKnob();
setupBrightKnob();
buildCatTabs();
renderList();
</script>
