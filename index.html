
<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Oswald:wght@400;600&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0a05;font-family:'Special Elite',cursive;color:#d4b483;padding:12px 8px 28px;min-height:100vh}
.site-header{text-align:center;padding:12px 0 10px}
.logo{font-family:'VT323',monospace;font-size:clamp(2rem,7vw,4.2rem);color:#f5a623;letter-spacing:.15em;line-height:1}
.logo span{color:#fff}
.tagline{font-family:'VT323',monospace;font-size:.85rem;color:#6a5030;letter-spacing:.3em;margin-top:3px}
.divider{width:50%;height:1px;background:linear-gradient(90deg,transparent,#c47d0e,transparent);margin:8px auto 0}
.layout{display:grid;grid-template-columns:1fr 300px;gap:18px;max-width:1060px;margin:0 auto;padding:10px 6px 0;align-items:start}
@media(max-width:720px){.layout{grid-template-columns:1fr}}

/* ── TV ── */
.tv-outer{background:linear-gradient(145deg,#8b5e3c,#5c3a1e,#3a2410,#5c3a1e);border-radius:14px 14px 26px 26px;padding:6px;box-shadow:0 18px 48px rgba(0,0,0,0.92),inset 0 1px 0 rgba(255,255,255,0.1)}
.tv-body{background:linear-gradient(160deg,#2e2010,#1a1208,#231910,#0f0a04);border-radius:10px 10px 20px 20px;padding:14px 14px 10px;border:2px solid #080502}
.tv-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.tv-brand{font-family:'VT323',monospace;font-size:.68rem;color:#4a3015;letter-spacing:.4em}
.ch-display{font-family:'VT323',monospace;font-size:1.2rem;color:#ff4400;background:#0a0200;padding:1px 6px;border-radius:3px;border:1px solid #1a0800;min-width:48px;text-align:center;transition:color .15s}
.screen-bezel{background:#0f0c06;border-radius:7px;padding:7px;box-shadow:inset 0 0 22px rgba(0,0,0,0.95)}
.screen-wrap{position:relative;border-radius:4px;overflow:hidden;aspect-ratio:4/3;background:#050500}
.scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.2) 2px,rgba(0,0,0,0.2) 4px);z-index:15;pointer-events:none}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 50%,rgba(0,0,0,0.6) 100%);z-index:16;pointer-events:none}

/* idle */
.idle{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:#060600;position:absolute;inset:0;z-index:2}
.idle-icon{font-size:2.6rem}
.idle-title{font-family:'VT323',monospace;font-size:1.9rem;color:#f5a623;margin-top:3px}
.idle-sub{font-family:'VT323',monospace;font-size:.72rem;color:#4a3a20;letter-spacing:.2em;margin-top:3px}
.test-bars{display:flex;width:100%;height:16px;margin-top:14px}
.test-bar{flex:1}
/* static */
.static-screen{position:absolute;inset:0;z-index:10;display:none;align-items:center;justify-content:center;background:#111}
.static-screen.show{display:flex}
.static-txt{font-family:'VT323',monospace;font-size:1rem;color:rgba(255,255,255,0.8);z-index:2;letter-spacing:.2em;animation:flk .12s infinite}
canvas.noise{position:absolute;inset:0;width:100%;height:100%}
/* off */
.off-screen{position:absolute;inset:0;background:#000;z-index:12;display:none;align-items:center;justify-content:center}
.off-screen.show{display:flex}
.off-line{width:100%;height:2px;background:#fff;animation:offAnim .5s ease-out forwards}
@keyframes offAnim{0%{opacity:1;transform:scaleX(1) scaleY(8)}60%{opacity:1;transform:scaleX(0.5) scaleY(1)}100%{opacity:0;transform:scaleX(0) scaleY(0)}}
/* video */
.video-layer{position:absolute;inset:0;z-index:3;display:none}
.video-layer.show{display:block}
.video-layer iframe{width:100%;height:100%;border:none;display:block}
/* splash */
.splash{position:absolute;inset:0;z-index:4;display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,0,0,0.7);padding:8px}
.splash.show{display:flex}
.splash-emoji{font-size:3.5rem}
.splash-title{font-family:'VT323',monospace;font-size:1.2rem;color:#f5a623;margin-top:6px;text-align:center;letter-spacing:.04em;line-height:1.2}
.splash-ep{font-family:'Special Elite',cursive;font-size:.6rem;color:#aaa;margin-top:3px;text-align:center}
.splash-play{margin-top:12px;width:46px;height:46px;border-radius:50%;background:rgba(245,166,35,0.12);border:2px solid #f5a623;display:flex;align-items:center;justify-content:center}
.splash-play::after{content:'';width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:18px solid #f5a623;margin-left:4px}
.splash-hint{font-family:'VT323',monospace;font-size:.62rem;color:#5a4020;margin-top:6px;letter-spacing:.08em}
/* ticker */
.ticker-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(5,5,0,0.92);border-top:1px solid #1e1600;padding:3px 8px;z-index:5;overflow:hidden;white-space:nowrap;display:none}
.ticker-bar.show{display:block}
.ticker-inner{display:inline-block;font-family:'VT323',monospace;font-size:.75rem;color:#f5a623;animation:ticker 28s linear infinite}
/* playlist badge */
.ep-counter{position:absolute;top:6px;right:6px;font-family:'VT323',monospace;font-size:.7rem;background:rgba(0,0,0,0.75);color:#f5a623;padding:2px 6px;border:1px solid #3a2800;z-index:6;display:none}
.ep-counter.show{display:block}

/* controls */
.tv-controls{display:flex;justify-content:space-between;align-items:center;padding:7px 4px 0}
.knobs{display:flex;gap:7px;align-items:center}
.knob-w{display:flex;flex-direction:column;align-items:center;gap:2px}
.knob{width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#5a4020,#1a0e04);border:2px solid #080402;cursor:pointer;position:relative;transition:transform .15s}
.knob::after{content:'';position:absolute;top:3px;left:50%;transform:translateX(-50%);width:2px;height:6px;background:#d4a850;border-radius:2px}
.kl{font-family:'VT323',monospace;font-size:.52rem;color:#4a3015;letter-spacing:.1em}
.pwr{width:15px;height:15px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#cc2200,#550a00);border:1px solid #220500;cursor:pointer;transition:all .2s;flex-shrink:0}
.pwr.on{background:radial-gradient(circle at 35% 35%,#ff3300,#990000);box-shadow:0 0 10px rgba(255,50,0,0.7)}
.spkr{display:grid;grid-template-columns:repeat(5,3px);gap:3px}
.sd{width:3px;height:3px;border-radius:50%;background:#080402}
.tv-legs{display:flex;justify-content:space-between;padding:0 26px;margin-top:-1px}
.leg{width:13px;height:16px;background:linear-gradient(to bottom,#5c3a1e,#2a1a08);border-radius:0 0 3px 3px}
.src-note{font-family:'VT323',monospace;font-size:.62rem;color:#2a1a08;text-align:center;margin-top:4px;letter-spacing:.08em}

/* ── GUIDE ── */
.guide-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:9px;border-bottom:1px solid #1e1600;padding-bottom:7px}
.guide-title{font-family:'VT323',monospace;font-size:1.6rem;color:#f5a623;letter-spacing:.08em}
.guide-date{font-family:'VT323',monospace;font-size:.75rem;color:#4a3015;letter-spacing:.12em}
.cat-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.cat-btn{font-family:'VT323',monospace;font-size:.72rem;padding:2px 8px;border:1px solid #2a1e0a;background:transparent;color:#7a5a2a;cursor:pointer;letter-spacing:.07em;border-radius:2px;transition:all .13s}
.cat-btn:hover,.cat-btn.active{background:#120c00;color:#f5a623;border-color:#c47d0e}
.cat-btn:active{transform:scale(0.95)}
.show-list{display:flex;flex-direction:column;gap:4px;max-height:60vh;overflow-y:auto;padding-right:3px}
.show-list::-webkit-scrollbar{width:3px}
.show-list::-webkit-scrollbar-thumb{background:#2a1e00;border-radius:2px}
.show-card{display:flex;gap:7px;align-items:center;background:#0c0900;border:1px solid #1a1400;border-left:3px solid #1e1600;padding:6px 8px;cursor:pointer;transition:all .13s;user-select:none}
.show-card:hover{border-left-color:#f5a623;background:#110d00}
.show-card:active{transform:scale(0.98)}
.show-card.active{border-left-color:#39ff14;background:#060d00}
.s-time{font-family:'VT323',monospace;font-size:.8rem;color:#4a3015;min-width:40px;flex-shrink:0}
.show-card.active .s-time{color:#39ff14}
.s-emoji{font-size:1.25rem;width:26px;text-align:center;flex-shrink:0}
.s-info{flex:1;min-width:0}
.s-name{font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:600;color:#d4b483;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.show-card.active .s-name{color:#39ff14}
.s-desc{font-family:'Special Elite',cursive;font-size:.58rem;color:#4a3015;margin-top:1px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.s-badges{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.badge{font-family:'VT323',monospace;font-size:.56rem;padding:1px 4px;border:1px solid #1e1600;color:#6a4a20;letter-spacing:.06em}
.badge.new{border-color:#c47d0e;color:#f5a623}
.badge.live{border-color:#39ff14;color:#39ff14;animation:flk 2s infinite}
.badge.playlist{border-color:#4a8cff;color:#6aacff}
.play-dot{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:8px solid #39ff14;flex-shrink:0;opacity:0;transition:opacity .2s}
.show-card:hover .play-dot{opacity:.4}
.show-card.active .play-dot{opacity:1}
.np-bar{display:none;gap:7px;align-items:center;margin-top:9px;padding:6px 9px;background:#060800;border:1px solid #1a1400}
.np-bar.show{display:flex}
.np-live{font-family:'VT323',monospace;font-size:.65rem;color:#39ff14;letter-spacing:.15em;flex-shrink:0;animation:flk 2s infinite}
.np-name{font-family:'Oswald',sans-serif;font-size:.72rem;color:#d4b483;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-ch{font-family:'VT323',monospace;font-size:.72rem;color:#f5a623;flex-shrink:0}

@keyframes flk{0%,90%,100%{opacity:1}95%{opacity:.3}}
@keyframes ticker{0%{transform:translateX(60%)}100%{transform:translateX(-100%)}}
</style>
</head>

function sndKnob(){try{const c=getAudio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(300,c.currentTime);o.frequency.exponentialRampToValueAtTime(120,c.currentTime+0.05);g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);o.start();o.stop(c.currentTime+0.06);}catch(e){}}
function sndPowerOn(){try{const c=getAudio(),bl=c.sampleRate*1.4,b=c.createBuffer(1,bl,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<bl;i++)d[i]=Math.random()*2-1;const s=c.createBufferSource();s.buffer=b;const f=c.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(2000,c.currentTime);f.frequency.exponentialRampToValueAtTime(200,c.currentTime+1.2);f.Q.value=0.8;const g=c.createGain();g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.35,c.currentTime+0.08);g.gain.setValueAtTime(0.35,c.currentTime+0.8);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+1.4);s.connect(f);f.connect(g);g.connect(c.destination);s.start();s.stop(c.currentTime+1.4);}catch(e){}}
function sndPowerOff(){try{const c=getAudio(),bl=c.sampleRate*0.5,b=c.createBuffer(1,bl,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<bl;i++)d[i]=Math.random()*2-1;const s=c.createBufferSource();s.buffer=b;const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=400;f.Q.value=1.5;const g2=c.createGain();g2.gain.setValueAtTime(0.3,c.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);const o=c.createOscillator(),og=c.createGain();o.type='sine';o.frequency.setValueAtTime(800,c.currentTime);o.frequency.exponentialRampToValueAtTime(40,c.currentTime+0.4);og.gain.setValueAtTime(0.2,c.currentTime);og.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);o.connect(og);og.connect(c.destination);s.connect(f);f.connect(g2);g2.connect(c.destination);s.start();s.stop(c.currentTime+0.5);o.start();o.stop(c.currentTime+0.5);}catch(e){}}
function sndTune(){try{const c=getAudio(),bl=c.sampleRate*0.9,b=c.createBuffer(1,bl,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<bl;i++)d[i]=Math.random()*2-1;const s=c.createBufferSource();s.buffer=b;const f=c.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(4000,c.currentTime);f.frequency.exponentialRampToValueAtTime(400,c.currentTime+0.7);f.Q.value=1.2;const g=c.createGain();g.gain.setValueAtTime(0.28,c.currentTime);g.gain.setValueAtTime(0.28,c.currentTime+0.6);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.9);s.connect(f);f.connect(g);g.connect(c.destination);s.start();s.stop(c.currentTime+0.9);}catch(e){}}

function buildSpeaker(){const g=document.getElementById('spkr');for(let i=0;i<20;i++){const d=document.createElement('div');d.className='sd';g.appendChild(d);}}

function buildCatTabs(){
  const el=document.getElementById('catTabs');
  const labels={'all':'All','2000s':'2000s MTV','british':'British','classic':'Classic TV','scifi':'Sci-Fi'};
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c==='all'?' active':'');
    b.textContent=labels[c]||c;
    b.dataset.cat=c;
    b.addEventListener('click',()=>{sndClick();document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeCat=c;renderList();});
    el.appendChild(b);
  });
}

function renderList(){
  const el=document.getElementById('showList');
  el.innerHTML='';
  const filtered=activeCat==='all'?shows:shows.filter(s=>s.cat===activeCat);
  filtered.forEach(s=>{
    const card=document.createElement('div');
    card.className='show-card'+(active?.id===s.id?' active':'');
    const badgesHtml=s.badges.map(b=>{
      let cls='badge';
      if(b==='NEW')cls+=' new';
      else if(b==='LIVE')cls+=' live';
      else if(b==='PLAYLIST')cls+=' playlist';
      return `<span class="${cls}">${b}</span>`;
    }).join('');
    card.innerHTML=`<span class="s-time">${s.time}</span><span class="s-emoji">${s.emoji}</span><div class="s-info"><div class="s-name">${s.name} <span style="font-size:.55rem;color:#3a2a10;font-family:'VT323',monospace">(${s.year})</span></div><div class="s-desc">${s.desc}</div><div class="s-badges">${badgesHtml}</div></div><div class="play-dot"></div>`;
    card.addEventListener('click',()=>{sndClick();tuneShow(s.id);});
    el.appendChild(card);
  });
}

function drawNoise(){
  const c=document.getElementById('noiseCanvas');
  const w=c.width=c.offsetWidth||300,h=c.height=c.offsetHeight||225;
  const ctx=c.getContext('2d'),img=ctx.createImageData(w,h);
  for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255;img.data[i]=v;img.data[i+1]=v;img.data[i+2]=v;img.data[i+3]=255;}
  ctx.putImageData(img,0,0);
}
function showStatic(cb){
  const ss=document.getElementById('staticScreen');
  ss.classList.add('show');sndTune();
  let f=0;
  noiseTimer=setInterval(()=>{drawNoise();if(++f>=18){clearInterval(noiseTimer);ss.classList.remove('show');if(cb)cb();}},50);
}

function tuneShow(id){
  if(!tvOn){powerToggle(()=>setTimeout(()=>tuneShow(id),400));return;}
  const s=shows.find(x=>x.id===id);
  if(!s)return;
  document.getElementById('videoLayer').classList.remove('show');
  document.getElementById('videoFrame').src='';
  document.getElementById('splash').classList.remove('show');
  document.getElementById('tickerBar').classList.remove('show');
  document.getElementById('epCounter').classList.remove('show');
  document.getElementById('chDisp').textContent=`CH ${s.ch}`;

  showStatic(()=>{
    active=s;
    document.getElementById('idle').style.display='none';

    // splash
    document.getElementById('splashEmoji').textContent=s.emoji;
    document.getElementById('splashTitle').textContent=s.name;
    document.getElementById('splashEp').textContent=s.episodeName;
    const splash=document.getElementById('splash');
    splash.classList.add('show');

    // ticker
    const t=s.tickers.join('   ◈   ');
    const tk=document.getElementById('tickerTxt');
    tk.textContent=`◈  ${t}  ◈  ${t}  ◈`;
    tk.style.animation='none';void tk.offsetHeight;tk.style.animation='';
    document.getElementById('tickerBar').classList.add('show');

    // playlist badge
    if(s.hasPlaylist){
      const ec=document.getElementById('epCounter');
      ec.textContent='▶ PLAYLIST';
      ec.classList.add('show');
    }

    document.getElementById('npName').textContent=s.name;
    document.getElementById('npCh').textContent=`CH ${s.ch}`;
    document.getElementById('npBar').classList.add('show');

    // build embed URL — archive.org's own player handles the internal playlist
    let embedUrl=`https://archive.org/embed/${s.archiveId}?autoplay=1&playlist=1`;
    if(s.embedUrl) embedUrl=s.embedUrl;

    splash.onclick=()=>{
      splash.classList.remove('show');
      const frame=document.getElementById('videoFrame');
      frame.src=embedUrl;
      document.getElementById('videoLayer').classList.add('show');
    };
    renderList();
  });
}

function powerToggle(cb){
  const btn=document.getElementById('pwrBtn');
  if(!tvOn){
    tvOn=true;btn.classList.add('on');sndPowerOn();
    document.getElementById('idle').style.display='flex';
    if(cb)cb();
  }else{
    sndPowerOff();btn.classList.remove('on');tvOn=false;active=null;
    clearInterval(noiseTimer);
    document.getElementById('staticScreen').classList.remove('show');
    document.getElementById('videoLayer').classList.remove('show');
    document.getElementById('videoFrame').src='';
    document.getElementById('splash').classList.remove('show');
    document.getElementById('tickerBar').classList.remove('show');
    document.getElementById('epCounter').classList.remove('show');
    document.getElementById('npBar').classList.remove('show');
    document.getElementById('chDisp').textContent='— —';
    const off=document.getElementById('offScreen');
    off.innerHTML='<div class="off-line"></div>';
    off.classList.add('show');
    setTimeout(()=>{off.classList.remove('show');document.getElementById('idle').style.display='flex';},600);
    renderList();
  }
}

['kVol','kTint','kBrit'].forEach(k=>{
  kAngles[k]=0;
  document.getElementById(k).addEventListener('click',function(){sndKnob();kAngles[k]+=45;this.style.transform=`rotate(${kAngles[k]}deg)`;});
});
document.getElementById('pwrBtn').addEventListener('click',()=>powerToggle());

const days=['SUN','MON','TUE','WED','THU','FRI','SAT'],months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const d=new Date();
document.getElementById('gDate').textContent=`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
buildSpeaker();buildCatTabs();renderList();
</script>
