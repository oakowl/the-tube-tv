<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Tube</title>
  <style>
    :root {
      --tv-bg: #1a1a1a;
      --tv-frame: #333;
      --screen-bg: #000;
      --glow: #0f0;
      --text: #0f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: var(--text);
    }

    .tv-container {
      background: var(--tv-frame);
      border: 18px solid #444;
      border-radius: 35px;
      padding: 25px;
      box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.6);
      max-width: 850px;
      width: 95%;
    }

    .tv-screen {
      background: var(--screen-bg);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 4/3;
    }

    .screen-content {
      width: 100%;
      height: 100%;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .scanlines {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      animation: flicker 0.15s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 0.85; }
      100% { opacity: 0.92; }
    }

    .channel-badge {
      position: absolute;
      bottom: 15px;
      left: 15px;
      background: rgba(0,0,0,0.75);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 15px;
      font-family: 'VT323', monospace;
      border: 1px solid #555;
      z-index: 2;
    }

    .tv-controls {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    button, input {
      background: #222;
      color: var(--glow);
      border: 2px solid #444;
      padding: 10px 14px;
      border-radius: 8px;
      font-family: 'VT323', monospace;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover { background: #333; border-color: #666; }
    button:active { transform: scale(0.95); }

    .channel-display {
      background: #0a0a0a;
      color: #f00;
      padding: 8px 14px;
      border-radius: 6px;
      border: 2px solid #333;
      font-size: 20px;
      min-width: 70px;
      text-align: center;
    }

    .status-bar {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #777;
    }

    /* Retro Font Fallback */
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
  </style>
</head>
<body>

  <div class="tv-container">
    <div class="tv-screen">
      <div class="screen-content">
        <iframe id="video-player" src="" allowfullscreen></iframe>
        <div class="scanlines"></div>
        <div class="channel-badge" id="channel-info">Loading channels...</div>
      </div>
    </div>

    <div class="tv-controls">
      <button id="prev-channel">◀ PREV</button>
      <button id="next-channel">NEXT ▶</button>
      <input type="text" id="search-input" placeholder="Search public domain shows...">
      <button id="search-btn">🔍</button>
      <div class="channel-display">CH: <span id="channel-num">--</span></div>
    </div>
    <div class="status-bar" id="status">Use ← → arrow keys to surf</div>
  </div>

  <script>
    const API_BASE = 'https://archive.org/advancedsearch.php';
    let channels = [];
    let currentIndex = 0;

    const player = document.getElementById('video-player');
    const channelInfo = document.getElementById('channel-info');
    const channelNum = document.getElementById('channel-num');
    const status = document.getElementById('status');
    const searchInput = document.getElementById('search-input');

    // Fetch public domain content from Internet Archive
    async function loadChannels(query = 'collection:(cartoons OR classic_tv OR prelinger) AND mediatype:(movies) AND rights:publicdomain') {
      status.textContent = 'Scanning frequencies...';
      const url = `${API_BASE}?q=${encodeURIComponent(query)}&fl[]=identifier,title,year&rows=60&output=json&sort[]=downloads desc`;
      
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();
        
        channels = data.response.docs.map(doc => ({
          id: doc.identifier,
          title: doc.title?.replace(/\[.*?\]/g, '').trim() || 'Unknown Title',
          year: doc.year || '?'
        })).filter(ch => ch.id); // Remove empty entries

        if (channels.length === 0) {
          status.textContent = 'No public domain channels found for this query.';
          return;
        }

        currentIndex = 0;
        switchChannel(0);
        status.textContent = `${channels.length} channels loaded. Use ← → to surf.`;
      } catch (err) {
        status.textContent = 'Signal lost. Check connection.';
        console.error(err);
      }
    }

    function switchChannel(index) {
      if (channels.length === 0) return;
      currentIndex = (index + channels.length) % channels.length;
      const ch = channels[currentIndex];
      
      // Archive.org embed URL
      player.src = `https://archive.org/embed/${ch.id}`;
      channelInfo.textContent = `${ch.title} (${ch.year})`;
      channelNum.textContent = String(currentIndex + 1).padStart(2, '0');
      
      // TV static effect on channel change
      const scanlines = document.querySelector('.scanlines');
      scanlines.style.opacity = '0.7';
      setTimeout(() => { scanlines.style.opacity = '1'; }, 400);
    }

    // Controls
    document.getElementById('prev-channel').addEventListener('click', () => switchChannel(currentIndex - 1));
    document.getElementById('next-channel').addEventListener('click', () => switchChannel(currentIndex + 1));

    document.getElementById('search-btn').addEventListener('click', () => {
      const q = searchInput.value.trim();
      if (q) loadChannels(`${q} AND mediatype:(movies) AND rights:publicdomain`);
    });

    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });

    // Keyboard surfing
    document.addEventListener('keydown', (e) => {
      if (document.activeElement === searchInput) return;
      if (e.key === 'ArrowLeft') switchChannel(currentIndex - 1);
      if (e.key === 'ArrowRight') switchChannel(currentIndex + 1);
    });

    // Initial load
    loadChannels();
  </script>
</body>
</html>
